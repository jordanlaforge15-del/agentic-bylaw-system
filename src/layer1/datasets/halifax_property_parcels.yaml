name: halifax_property_parcels
publisher: Halifax Regional Municipality
format: geojson
# HRM publishes parcel polygons as an ArcGIS REST FeatureServer layer on
# the same host as the other Halifax datasets. The parser handles
# pagination via the existing ArcGIS REST path. outSR=4326 asks the
# server to reproject from EPSG:3857 (the layer's native CRS) so the
# parser receives a CRS-clean payload. Verify the service name against
# the current HRM open data catalogue before first ingest — Halifax has
# republished parcel layers under slightly different names in the past.
source_url: https://services2.arcgis.com/11XBiaBYA9Ep0yNJ/arcgis/rest/services/Parcels/FeatureServer/0/query?where=1%3D1&outFields=*&outSR=4326&f=geojson
crs: EPSG:4326

# role=property_parcels lets the case-open spatial extractor find the
# parcels dataset without hard-coding its numeric id. Datasets with a
# role do not need a links_to binding (parcels are base geography, not
# a bylaw fragment).
role: property_parcels

attributes:
  # HRM's parcel layer keys each feature on PID (Nova Scotia Parcel ID).
  # If the actual layer uses a different feature key (e.g. OBJECTID),
  # adjust this on first ingest and verify with --dry-run.
  feature_key: PID
  canonical:
    parcel_id:
      from: PID
      type: string
  ignore:
    - OBJECTID
    - Shape__Area
    - Shape__Length
    - FCODE
    - SACC
