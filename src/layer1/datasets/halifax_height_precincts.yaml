name: halifax_height_precincts
publisher: Halifax Regional Municipality
format: geojson
source_path: data/geo-datasets/Maximum_Building_Heights_6478354320888850499.geojson
crs: EPSG:4326

links_to:
  document_match:
    municipality: HRM
    bylaw_name: Regional Centre Land Use By-Law
  fragment_citation: Schedule 15

attributes:
  feature_key: GlobalID
  canonical:
    # Mutually exclusive in the published data: a precinct caps height by
    # metres OR by stories, never both. Both are optional so a feature with
    # only one set still parses cleanly.
    max_height_m:
      from: MAXBLDHGT
      type: float
      optional: true
    max_height_storeys:
      from: MAXBLDSTRY
      type: int
      optional: true
    effective_date:
      from: SDATE
      type: rfc2822_date
      optional: true
    source_case:
      from: SOURCE
      type: string
      optional: true
    bylaw_area:
      from: BYLAW_AREA
      type: string
      optional: true
  ignore:
    - OBJECTID
    - BHTMAX_ID
    - FCODE
    - SACC
    - ADDDATE
    - MODDATE
