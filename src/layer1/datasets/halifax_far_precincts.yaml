name: halifax_far_precincts
publisher: Halifax Regional Municipality
format: geojson
# Schedule 17 of the RCLUB: Maximum Floor Area Ratio Precincts.
source_url: https://services2.arcgis.com/11XBiaBYA9Ep0yNJ/arcgis/rest/services/RC_Maximum_Floor_Area_Ratio/FeatureServer/0/query?where=1%3D1&outFields=*&outSR=4326&f=geojson
crs: EPSG:4326

links_to:
  document_match:
    municipality: HRM
    bylaw_name: Regional Centre Land Use By-Law
  fragment_citation: Schedule 17

attributes:
  feature_key: GLOBALID
  canonical:
    max_far:
      from: FAR
      type: float
    effective_date:
      from: SDATE
      type: epoch_ms_date
      optional: true
    source_case:
      from: SOURCE
      type: string
      optional: true
  ignore:
    - OBJECTID
    - FCODE
    - SACC
    - ADDDATE
    - MODDATE
    - Shape__Area
    - Shape__Length
