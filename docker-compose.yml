services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    image: agentic-bylaw-system-postgres:pg16-pgvector-postgis
    environment:
      POSTGRES_DB: layer1
      POSTGRES_USER: layer1
      POSTGRES_PASSWORD: layer1
    ports:
      - "5432:5432"
    volumes:
      - layer1-postgres:/var/lib/postgresql/data
    # Cap how long an idle-in-transaction or any single statement can
    # tie up a backend. The advisor's spatial scan over 11k zoning
    # polygons runs in seconds normally, but if a client disconnects
    # mid-stream the SQLAlchemy session may not roll back promptly —
    # without a server-side cap, that can wedge a connection (and any
    # row locks it holds) indefinitely. 60s/120s is generous enough
    # for any legitimate query and short enough to self-heal.
    command: >
      postgres
      -c idle_in_transaction_session_timeout=60000
      -c statement_timeout=120000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U layer1 -d layer1"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    # Local-dev Next.js. Uses node:22-alpine directly (not web/Dockerfile,
    # which is the optimised production build) so NEXT_PUBLIC_* vars are
    # read at runtime — no rebuild needed when you change keys. Mounts
    # web/ as a volume so hot-reload works against your editor.
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    env_file:
      - ./web/.env.local
    environment:
      # Override ADVISOR_API_URL so the web container reaches the host
      # uvicorn (running outside Docker) instead of trying 127.0.0.1
      # inside its own network namespace.
      ADVISOR_API_URL: http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./web:/app
      - web-node-modules:/app/node_modules

  codex:
    build:
      context: .
      dockerfile: Dockerfile.codex
    image: agentic-bylaw-system-codex:latest
    container_name: agentic-bylaw-system-codex
    working_dir: /workspace
    stdin_open: true
    tty: true
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CODEX_HOME: /home/codex/.codex
      NPM_CONFIG_PREFIX: /home/codex/.npm-global
      PIP_BREAK_SYSTEM_PACKAGES: "1"
      DATABASE_URL: postgresql+psycopg://layer1:layer1@postgres:5432/layer1
    volumes:
      - .:/workspace
      - codex-home:/home/codex/.codex
      - codex-cache:/home/codex/.cache
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      bash -c 'codex --dangerously-bypass-approvals-and-sandbox'

volumes:
  layer1-postgres:
  codex-home:
  codex-cache:
  web-node-modules:
